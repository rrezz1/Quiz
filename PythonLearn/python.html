<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyPraktike — Assessment Ready</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6aff;
    --accent2: #ff6a9a;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --muted: #7878a0;
    --success: #4ade80;
    --error: #f87171;
    --warning: #fbbf24;
    --easy: #4ade80;
    --med: #fbbf24;
    --hard: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }

  .logo {
    font-size: 1.3rem; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }

  .header-right { display: flex; align-items: center; gap: 1.5rem; }

  .diff-stats { display: flex; gap: 1rem; }
  .diff-stat {
    display: flex; align-items: center; gap: .4rem;
    font-family: 'JetBrains Mono', monospace; font-size: .72rem;
  }
  .diff-stat .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-easy { background: var(--easy); }
  .dot-med { background: var(--med); }
  .dot-hard { background: var(--hard); }

  .total-progress {
    display: flex; align-items: center; gap: .7rem;
  }
  .prog-label { font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--muted); white-space: nowrap; }
  .prog-outer { width: 120px; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .prog-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 99px; transition: width .4s ease; }

  .hero {
    text-align: center; padding: 3.5rem 2rem 1.5rem;
    position: relative; z-index: 1;
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800; letter-spacing: -2px; line-height: 1.05; margin-bottom: .7rem;
  }
  .hero h1 .g { background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--muted); font-size: .95rem; max-width: 460px; margin: 0 auto; }

  /* ── DIFF TABS ── */
  .diff-tabs {
    display: flex; justify-content: center; gap: 0;
    padding: 2rem 2rem 0;
    position: relative; z-index: 1;
  }
  .diff-tab {
    padding: .65rem 2.2rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: .85rem;
    cursor: pointer; transition: all .2s;
    position: relative;
  }
  .diff-tab:first-child { border-radius: 10px 0 0 10px; }
  .diff-tab:last-child { border-radius: 0 10px 10px 0; }
  .diff-tab:not(:last-child) { border-right: none; }

  .diff-tab.active-easy {
    background: rgba(74,222,128,.12);
    border-color: rgba(74,222,128,.4);
    color: var(--easy);
  }
  .diff-tab.active-med {
    background: rgba(251,191,36,.12);
    border-color: rgba(251,191,36,.4);
    color: var(--med);
  }
  .diff-tab.active-hard {
    background: rgba(248,113,113,.12);
    border-color: rgba(248,113,113,.4);
    color: var(--hard);
  }

  .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 99px;
    font-size: .65rem; font-family: 'JetBrains Mono', monospace;
    margin-left: .5rem;
    background: var(--border); color: var(--muted);
  }
  .diff-tab.active-easy .tab-count { background: rgba(74,222,128,.25); color: var(--easy); }
  .diff-tab.active-med .tab-count { background: rgba(251,191,36,.25); color: var(--med); }
  .diff-tab.active-hard .tab-count { background: rgba(248,113,113,.25); color: var(--hard); }

  /* ── DIFF PROGRESS BARS ── */
  .diff-progress-row {
    display: flex; justify-content: center; gap: 1.5rem;
    padding: 1.2rem 2rem;
    position: relative; z-index: 1;
  }
  .diff-prog-item { display: flex; align-items: center; gap: .6rem; }
  .diff-prog-label { font-family: 'JetBrains Mono', monospace; font-size: .68rem; color: var(--muted); white-space: nowrap; }
  .diff-prog-outer { width: 80px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .diff-prog-inner { height: 100%; border-radius: 99px; transition: width .4s ease; }
  .dpi-easy { background: var(--easy); }
  .dpi-med { background: var(--med); }
  .dpi-hard { background: var(--hard); }

  main {
    max-width: 860px; margin: 0 auto; padding: 1.5rem 1.5rem 5rem;
    position: relative; z-index: 1;
  }

  /* ── SECTION ── */
  .section { margin-bottom: 3rem; animation: fadeIn .35s ease both; }

  .section-header {
    display: flex; align-items: center; gap: .8rem; margin-bottom: 1.2rem;
    padding-bottom: .7rem; border-bottom: 1px solid var(--border);
  }
  .section-icon { font-size: 1rem; }
  .section-title-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -.4px; }
  .section-badge {
    font-family: 'JetBrains Mono', monospace; font-size: .65rem;
    padding: .18rem .55rem; border-radius: 99px;
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
  }
  .section-done-badge {
    font-family: 'JetBrains Mono', monospace; font-size: .65rem;
    padding: .18rem .55rem; border-radius: 99px;
    background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); color: var(--easy);
    margin-left: auto;
  }

  /* ── TASK CARD ── */
  .task-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: .8rem; overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .task-card:hover { border-color: rgba(124,106,255,.4); }
  .task-card.done { border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.03); }

  .task-header {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem 1.2rem; cursor: pointer; user-select: none;
  }

  .task-num {
    min-width: 26px; height: 26px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: .7rem;
    color: var(--muted); flex-shrink: 0; margin-top: 1px;
  }
  .task-card.done .task-num { background: rgba(74,222,128,.15); border-color: rgba(74,222,128,.4); color: var(--easy); }

  .task-title-wrap { flex: 1; }
  .task-title { font-size: .93rem; font-weight: 700; line-height: 1.4; margin-bottom: .3rem; }
  .task-meta { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .task-cat {
    font-family: 'JetBrains Mono', monospace; font-size: .62rem;
    padding: .12rem .45rem; border-radius: 99px;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  }

  .task-toggle {
    width: 26px; height: 26px; border: none; background: transparent;
    color: var(--muted); font-size: .9rem; cursor: pointer;
    transition: transform .25s; flex-shrink: 0;
  }
  .task-toggle.open { transform: rotate(180deg); }

  /* done checkmark in header */
  .done-indicator {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: all .2s; background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; color: transparent; margin-top: 2px;
  }
  .done-indicator.checked {
    background: var(--easy); border-color: var(--easy); color: #fff;
  }

  .task-body {
    display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--border);
  }
  .task-body.open { display: block; }

  .task-desc {
    font-size: .87rem; color: var(--muted); line-height: 1.75; margin: .85rem 0 1rem;
  }

  .hint-box {
    background: var(--surface); border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0; padding: .65rem 1rem; margin-bottom: .9rem;
    font-size: .8rem; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    display: none; line-height: 1.6;
  }
  .hint-box.show { display: block; }
  .hint-label { color: var(--accent); font-weight: 700; font-size: .65rem; letter-spacing: .08em; display: block; margin-bottom: .35rem; }

  .editor-label {
    font-family: 'JetBrains Mono', monospace; font-size: .62rem;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: .35rem; display: block;
  }
  textarea.code-editor {
    width: 100%; min-height: 110px; resize: vertical;
    background: #0d0d14; border: 1px solid var(--border);
    border-radius: 8px; color: var(--accent3);
    font-family: 'JetBrains Mono', monospace; font-size: .82rem;
    padding: .85rem 1rem; line-height: 1.6; outline: none;
    transition: border-color .2s; tab-size: 4; margin-bottom: .75rem;
  }
  textarea.code-editor:focus { border-color: var(--accent); }

  .task-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .75rem; }
  .btn {
    padding: .4rem 1rem; border-radius: 7px; border: none;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: .78rem;
    cursor: pointer; transition: all .18s;
  }
  .btn-run { background: var(--accent); color: #fff; }
  .btn-run:hover { background: #9080ff; }
  .btn-hint { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .btn-hint:hover { border-color: var(--accent); color: var(--accent); }
  .btn-solution { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .btn-solution:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-mark { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .btn-mark.marked { background: rgba(74,222,128,.12); border-color: rgba(74,222,128,.4); color: var(--easy); }

  /* ── OUTPUT ── */
  .output-wrap { margin-bottom: .6rem; }
  .output-label { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .35rem; display: none; }
  .output-label.show { display: block; }

  .output-box {
    background: #0d0d14; border: 1px solid var(--border);
    border-radius: 8px; padding: .75rem 1rem;
    font-family: 'JetBrains Mono', monospace; font-size: .8rem;
    white-space: pre-wrap; line-height: 1.6; display: none;
  }
  .output-box.show { display: block; }
  .output-box.ok { border-color: rgba(74,222,128,.4); color: var(--easy); }
  .output-box.fail { border-color: rgba(248,113,113,.4); color: var(--error); }
  .output-box.neutral { color: var(--text); }

  .verdict-bar {
    display: none; align-items: center; gap: .6rem;
    padding: .5rem .85rem; border-radius: 8px; margin-top: .4rem;
    font-size: .8rem; font-weight: 700;
  }
  .verdict-bar.show { display: flex; }
  .verdict-bar.pass { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); color: var(--easy); }
  .verdict-bar.fail { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--error); }

  .solution-box {
    background: #0d0d14; border: 1px solid rgba(255,106,154,.25);
    border-radius: 8px; padding: .75rem 1rem; margin-top: .5rem;
    font-family: 'JetBrains Mono', monospace; font-size: .8rem;
    color: var(--accent2); white-space: pre-wrap; line-height: 1.6;
    display: none;
  }
  .solution-box.show { display: block; }
  .sol-label { color: var(--muted); font-size: .62rem; letter-spacing: .08em; display: block; margin-bottom: .4rem; text-transform: uppercase; }

  /* ── EMPTY ── */
  .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }

  footer {
    text-align: center; padding: 2rem; color: var(--muted);
    font-size: .8rem; border-top: 1px solid var(--border);
    position: relative; z-index: 1;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="logo">🐍 PyPraktike</div>
  <div class="header-right">
    <div class="diff-stats">
      <div class="diff-stat"><div class="dot dot-easy"></div><span id="stat-easy">0/0</span></div>
      <div class="diff-stat"><div class="dot dot-med"></div><span id="stat-med">0/0</span></div>
      <div class="diff-stat"><div class="dot dot-hard"></div><span id="stat-hard">0/0</span></div>
    </div>
    <div class="total-progress">
      <span class="prog-label" id="total-label">0/0</span>
      <div class="prog-outer"><div class="prog-inner" id="total-bar" style="width:0%"></div></div>
    </div>
  </div>
</header>

<div class="hero">
  <h1>Gati për<br><span class="g">Python Assessment</span></h1>
  <p>Të gjitha detyrat të organizuara sipas vështirësisë. Zgjidh, ekzekuto, kontrollo rezultatin.</p>
</div>

<!-- DIFF TABS -->
<div class="diff-tabs">
  <button class="diff-tab active-easy" id="tab-easy" onclick="switchTab('easy')">
    ● E Lehtë <span class="tab-count" id="tc-easy">0</span>
  </button>
  <button class="diff-tab" id="tab-med" onclick="switchTab('med')">
    ● Mesatare <span class="tab-count" id="tc-med">0</span>
  </button>
  <button class="diff-tab" id="tab-hard" onclick="switchTab('hard')">
    ● E Vështirë <span class="tab-count" id="tc-hard">0</span>
  </button>
</div>

<div class="diff-progress-row">
  <div class="diff-prog-item">
    <span class="diff-prog-label" id="dp-easy-lbl">0/0</span>
    <div class="diff-prog-outer"><div class="diff-prog-inner dpi-easy" id="dp-easy" style="width:0%"></div></div>
  </div>
  <div class="diff-prog-item">
    <span class="diff-prog-label" id="dp-med-lbl">0/0</span>
    <div class="diff-prog-outer"><div class="diff-prog-inner dpi-med" id="dp-med" style="width:0%"></div></div>
  </div>
  <div class="diff-prog-item">
    <span class="diff-prog-label" id="dp-hard-lbl">0/0</span>
    <div class="diff-prog-outer"><div class="diff-prog-inner dpi-hard" id="dp-hard" style="width:0%"></div></div>
  </div>
</div>

<main id="main"></main>

<footer>Ushtro, ushtro, ushtro! 💪 — <strong>Suksese në assessment!</strong></footer>

<script>
const CAT_LABELS = {
  bazat:'Bazat të Python', stringjet:'Strings & Text', listat:'Lista & Tuples',
  fjalorët:'Dictionaries', kushtet:'If / Else', loops:'Loops',
  funksionet:'Funksionet', oop:'OOP – Klasa', file_io:'File I/O', errors:'Errors & Exceptions'
};
const CAT_ICONS = {
  bazat:'⚡', stringjet:'📝', listat:'📋', fjalorët:'🗂', kushtet:'🔀',
  loops:'🔁', funksionet:'⚙️', oop:'🏗', file_io:'📁', errors:'🛡'
};

const tasks = [
  // ── BAZAT ──────────────────────────────────────────────────
  { id:0, cat:'bazat', diff:'easy', title:'Llogarit shumën e dy numrave',
    desc:'Shkruaj kodin që merr dy numra (a=15, b=27) dhe printon shumën e tyre.',
    hint:'Përdor operator + dhe funksionin print().',
    solution:'a = 15\nb = 27\nprint(a + b)',
    test: c => c.includes('15') && c.includes('27') && c.includes('print') },
  { id:1, cat:'bazat', diff:'easy', title:'Llogarit sipërfaqen e rrethit',
    desc:'Shkruaj kodin që llogarit sipërfaqen e një rrethi me rreze r=7.\nFormula: π × r². Përdor math.pi.',
    hint:'import math\nmath.pi * r**2',
    solution:'import math\nr = 7\nprint(math.pi * r**2)',
    test: c => c.includes('math') && c.includes('7') },
  { id:2, cat:'bazat', diff:'med', title:'Konverto Celsius në Fahrenheit',
    desc:'Shkruaj funksionin celsius_to_f(c) që konverton gradët Celsius në Fahrenheit.\nFormula: F = (C × 9/5) + 32\nTesto me: celsius_to_f(100) → 212.0',
    hint:'Kthe vlerën me return, mos printo brenda funksionit.',
    solution:'def celsius_to_f(c):\n    return (c * 9/5) + 32\n\nprint(celsius_to_f(100))',
    test: c => c.includes('9/5') || c.includes('9 / 5') },
  { id:3, cat:'bazat', diff:'med', title:'Numri çift apo tek?',
    desc:'Shkruaj funksionin is_even(n) që kthen True nëse numri është çift, False nëse është tek.\nTesto: is_even(4) → True, is_even(7) → False',
    hint:'Operatori modulo % është miku yt. n % 2 == 0',
    solution:'def is_even(n):\n    return n % 2 == 0\n\nprint(is_even(4))\nprint(is_even(7))',
    test: c => c.includes('%') && (c.includes('== 0') || c.includes('==0')) },
  { id:4, cat:'bazat', diff:'hard', title:'Numri i fjalëve pa split()',
    desc:'Shkruaj funksionin count_words(s) që numëron fjalët në një string duke iteruar karakteret (pa përdorur .split()).\nTesto: count_words("hello world foo") → 3',
    hint:'Mbaj gjurmë kur kalon nga hapësirë te jo-hapësirë. Llogaris tranzicionet.',
    solution:'def count_words(s):\n    count = 0\n    in_word = False\n    for ch in s:\n        if ch != " " and not in_word:\n            count += 1\n            in_word = True\n        elif ch == " ":\n            in_word = False\n    return count\n\nprint(count_words("hello world foo"))',
    test: c => c.includes('def count_words') },

  // ── STRINGS ────────────────────────────────────────────────
  { id:5, cat:'stringjet', diff:'easy', title:'Reverse string',
    desc:'Shkruaj funksionin reverse_str(s) që kthen stringun të kthyer mbrapsht.\nTesto: reverse_str("python") → "nohtyp"',
    hint:'Slicing: s[::-1]',
    solution:'def reverse_str(s):\n    return s[::-1]\n\nprint(reverse_str("python"))',
    test: c => c.includes('[::-1]') || c.includes('reversed') },
  { id:6, cat:'stringjet', diff:'easy', title:'Numëro zanorët',
    desc:'Shkruaj funksionin count_vowels(s) që numëron zanorët (a,e,i,o,u) në një string. Ignore case.\nTesto: count_vowels("Hello World") → 3',
    hint:"Ktheje stringun lowercase dhe kontrollo 'aeiou'.",
    solution:'def count_vowels(s):\n    return sum(1 for c in s.lower() if c in "aeiou")\n\nprint(count_vowels("Hello World"))',
    test: c => c.includes('aeiou') },
  { id:7, cat:'stringjet', diff:'med', title:'Palindrome checker',
    desc:"Shkruaj funksionin is_palindrome(s) që kontrollon nëse një fjalë lexohet njëlloj si mbrapsht. Ignore hapësirat dhe caps.\nTesto: is_palindrome('racecar') → True, is_palindrome('hello') → False",
    hint:"Pastro stringun: s.replace(' ','').lower() dhe krahaso me reverse.",
    solution:"def is_palindrome(s):\n    s = s.replace(' ', '').lower()\n    return s == s[::-1]\n\nprint(is_palindrome('racecar'))\nprint(is_palindrome('hello'))",
    test: c => c.includes('palindrome') || c.includes('[::-1]') },
  { id:8, cat:'stringjet', diff:'med', title:'Fshih fjalëkalimin',
    desc:'Shkruaj funksionin mask_password(pw) që fsheh të gjitha karakteret përveç 3 të fundit me "*".\nTesto: mask_password("mysecret123") → "********123"',
    hint:'len(pw) - 3 karaktere bëhen *, 3 të fundit mbeten. pw[-3:]',
    solution:'def mask_password(pw):\n    return "*" * (len(pw) - 3) + pw[-3:]\n\nprint(mask_password("mysecret123"))',
    test: c => c.includes('-3') || c.includes('[-3') },

// ── State ──────────────────────────────────────────────────
let doneSet = new Set(JSON.parse(localStorage.getItem('py_done_v2') || '[]'));
let currentTab = 'easy';

function saveDone() { localStorage.setItem('py_done_v2', JSON.stringify([...doneSet])); }

function updateProgress() {
  const byDiff = { easy: [], med: [], hard: [] };
  tasks.forEach(t => byDiff[t.diff].push(t.id));

  const countDone = diff => byDiff[diff].filter(id => doneSet.has(id)).length;
  const total = id => byDiff[id].length;

  ['easy','med','hard'].forEach(d => {
    const done = countDone(d), tot = total(d);
    const pct = tot ? (done/tot*100).toFixed(0) : 0;
    document.getElementById(`dp-${d}-lbl`).textContent = `${done}/${tot}`;
    document.getElementById(`dp-${d}`).style.width = pct + '%';
    document.getElementById(`stat-${d}`).textContent = `${done}/${tot}`;
    document.getElementById(`tc-${d}`).textContent = tot;
  });

  const totalAll = tasks.length;
  const doneAll = doneSet.size;
  document.getElementById('total-label').textContent = `${doneAll}/${totalAll}`;
  document.getElementById('total-bar').style.width = (doneAll/totalAll*100) + '%';
}

// ── Tab switch ─────────────────────────────────────────────
function switchTab(diff) {
  currentTab = diff;
  ['easy','med','hard'].forEach(d => {
    const btn = document.getElementById(`tab-${d}`);
    btn.className = `diff-tab${d === diff ? ` active-${d}` : ''}`;
  });
  renderTasks();
}

// ── Render ─────────────────────────────────────────────────
function renderTasks() {
  const filtered = tasks.filter(t => t.diff === currentTab);
  const groups = {};
  filtered.forEach(t => {
    if (!groups[t.cat]) groups[t.cat] = [];
    groups[t.cat].push(t);
  });

  const main = document.getElementById('main');
  if (!filtered.length) {
    main.innerHTML = '<div class="empty-state">Nuk ka detyra këtu.</div>';
    return;
  }

  const doneInTab = filtered.filter(t => doneSet.has(t.id)).length;
  const totalInTab = filtered.length;

  main.innerHTML = Object.entries(groups).map(([cat, catTasks]) => {
    const catDone = catTasks.filter(t => doneSet.has(t.id)).length;
    return `<div class="section">
      <div class="section-header">
        <span class="section-icon">${CAT_ICONS[cat]||'📌'}</span>
        <span class="section-title-text">${CAT_LABELS[cat]||cat}</span>
        <span class="section-badge">${catTasks.length} detyra</span>
        ${catDone > 0 ? `<span class="section-done-badge">✓ ${catDone}/${catTasks.length}</span>` : ''}
      </div>
      ${catTasks.map(t => renderCard(t)).join('')}
    </div>`;
  }).join('');
}

function renderCard(t) {
  const done = doneSet.has(t.id);
  return `<div class="task-card${done?' done':''}" id="card-${t.id}">
    <div class="task-header" onclick="toggleCard(${t.id})">
      <div class="task-num">${t.id+1}</div>
      <div class="task-title-wrap">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span class="task-cat">${CAT_LABELS[t.cat]||t.cat}</span>
        </div>
      </div>
      <div class="done-indicator${done?' checked':''}" id="chk-${t.id}"
           onclick="event.stopPropagation(); markDone(${t.id})">✓</div>
      <button class="task-toggle" id="tog-${t.id}">▼</button>
    </div>
    <div class="task-body" id="body-${t.id}">
      <p class="task-desc">${t.desc.replace(/\n/g,'<br>')}</p>
      <div class="hint-box" id="hint-${t.id}">
        <span class="hint-label">💡 HINT</span>${t.hint.replace(/\n/g,'<br>')}
      </div>
      <span class="editor-label">Kodi yt — shkruaj dhe ekzekuto</span>
      <textarea class="code-editor" id="code-${t.id}" placeholder="# Shkruaj kodin këtu...&#10;" spellcheck="false"></textarea>
      <div class="task-actions">
        <button class="btn btn-run" onclick="runCode(${t.id})">▶ Ekzekuto &amp; Kontrollo</button>
        <button class="btn btn-hint" onclick="toggleHint(${t.id})">💡 Hint</button>
        <button class="btn btn-solution" onclick="toggleSolution(${t.id})">👁 Zgjidhja</button>
        <button class="btn btn-mark${done?' marked':''}" id="mbtn-${t.id}" onclick="markDone(${t.id})">${done?'✓ E bërë':'Shëno si e bërë'}</button>
      </div>
      <div class="output-wrap">
        <span class="output-label" id="outlbl-${t.id}">Rezultati</span>
        <div class="output-box" id="out-${t.id}"></div>
        <div class="verdict-bar" id="verd-${t.id}"></div>
      </div>
      <div class="solution-box" id="sol-${t.id}">
        <span class="sol-label">Zgjidhja zyrtare</span>${escHtml(t.solution)}
      </div>
    </div>
  </div>`;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleCard(id) {
  document.getElementById(`body-${id}`).classList.toggle('open');
  document.getElementById(`tog-${id}`).classList.toggle('open');
}
function toggleHint(id) { document.getElementById(`hint-${id}`).classList.toggle('show'); }
function toggleSolution(id) { document.getElementById(`sol-${id}`).classList.toggle('show'); }

// ── Run & check ─────────────────────────────────────────────
function runCode(id) {
  const task = tasks.find(t => t.id === id);
  const code = document.getElementById(`code-${id}`).value.trim();
  const outBox = document.getElementById(`out-${id}`);
  const outLbl = document.getElementById(`outlbl-${id}`);
  const verd = document.getElementById(`verd-${id}`);

  outBox.className = 'output-box';
  verd.className = 'verdict-bar';

  if (!code) {
    outBox.textContent = '⚠ Shkruaj kodin fillimisht!';
    outBox.classList.add('show','fail');
    outLbl.classList.add('show');
    return;
  }

  // Check
  const passed = task.test(code);

  // Simulate output (static feedback)
  outLbl.classList.add('show');
  outBox.classList.add('show');

  if (passed) {
    outBox.classList.add('ok');
    outBox.textContent = '✓ Kodi duket i saktë! Struktura e zgjidhjës është e mirë.';
    verd.classList.add('show','pass');
    verd.textContent = '✓ E saktë — mund ta shënosh si të bërë!';
    // auto mark done
    if (!doneSet.has(id)) {
      doneSet.add(id);
      saveDone();
      updateProgress();
      refreshCardDoneState(id);
      rerenderSectionBadge();
    }
  } else {
    outBox.classList.add('fail');
    outBox.textContent = '✗ Kodi nuk kalon testin. Shiko hintin ose zgjidhjen.';
    verd.classList.add('show','fail');
    verd.textContent = '✗ Jo e saktë ende — provo sërish!';
  }
}

function refreshCardDoneState(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  const done = doneSet.has(id);
  card.classList.toggle('done', done);
  const chk = document.getElementById(`chk-${id}`);
  if (chk) chk.classList.toggle('checked', done);
  const mbtn = document.getElementById(`mbtn-${id}`);
  if (mbtn) {
    mbtn.textContent = done ? '✓ E bërë' : 'Shëno si e bërë';
    mbtn.className = `btn btn-mark${done?' marked':''}`;
  }
  const num = card.querySelector('.task-num');
  if (num) num.style.cssText = done ? 'background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.4);color:var(--easy)' : '';
}

function rerenderSectionBadge() {
  // Update section done badges without full re-render
  document.querySelectorAll('.section').forEach(sec => {
    const cards = sec.querySelectorAll('.task-card');
    const total = cards.length;
    const done = [...cards].filter(c => c.classList.contains('done')).length;
    let badge = sec.querySelector('.section-done-badge');
    if (done > 0) {
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'section-done-badge';
        sec.querySelector('.section-header').appendChild(badge);
      }
      badge.textContent = `✓ ${done}/${total}`;
    } else if (badge) {
      badge.remove();
    }
  });
}

function markDone(id) {
  if (doneSet.has(id)) doneSet.delete(id);
  else doneSet.add(id);
  saveDone();
  updateProgress();
  refreshCardDoneState(id);
  rerenderSectionBadge();
}

// ── Tab key ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Tab' && e.target.classList.contains('code-editor')) {
    e.preventDefault();
    const s = e.target.selectionStart, en = e.target.selectionEnd;
    e.target.value = e.target.value.substring(0,s) + '    ' + e.target.value.substring(en);
    e.target.selectionStart = e.target.selectionEnd = s + 4;
  }
});

// ── Init ────────────────────────────────────────────────────
renderTasks();
updateProgress();
</script>
</body>
</html>
