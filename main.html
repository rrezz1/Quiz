<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Hub — Python & SQL</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#060608; --surface:#0f0f14; --card:#141419; --border:#1f1f2e;
  --py:#3b82f6; --py2:#60a5fa; --sql:#a855f7; --sql2:#c084fc;
  --text:#ececf4; --muted:#6b6b8a;
  --glow-py:rgba(59,130,246,0.15); --glow-sql:rgba(168,85,247,0.15);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;
  display:flex;flex-direction:column;align-items:center;
}

header{
  width:100%;max-width:900px;
  padding:2rem;display:flex;justify-content:space-between;
}
.brand{font-size:.85rem;color:var(--muted)}
.brand span{color:var(--py2)}

.hero{text-align:center;padding:3rem}
.hero h1{font-size:3rem;font-weight:900}
.word-py{color:var(--py2)}
.word-sql{color:var(--sql2)}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1.5rem;
  max-width:900px;
  width:100%;
  padding:2rem;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.5rem;
  text-decoration:none;
  color:var(--text);
  display:flex;
  flex-direction:column;
  gap:1rem;
  transition:.3s;
}

.card:hover{transform:translateY(-5px)}

.card-py:hover{border-color:var(--py)}
.card-sql:hover{border-color:var(--sql)}

.card-icon{font-size:2rem}

.card-tag{
  font-size:.7rem;
  padding:.2rem .5rem;
  border-radius:10px;
}

.tag-py{background:rgba(59,130,246,.2);color:var(--py2)}
.tag-sql{background:rgba(168,85,247,.2);color:var(--sql2)}

.card-topics{display:flex;flex-wrap:wrap;gap:.3rem}
.topic{font-size:.65rem;background:#111;padding:.2rem .4rem;border-radius:5px}

.card-cta{margin-top:auto;font-size:.8rem}

.stats{
  display:flex;
  gap:2rem;
  padding:1rem;
}

.stat{text-align:center}
.stat-num{font-size:1.5rem;font-weight:bold}

footer{
  margin-top:2rem;
  padding:1rem;
  font-size:.8rem;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <div class="brand">rrezz1 / <span>Quiz</span></div>
</header>

<div class="hero">
  <h1>
    <span class="word-py">Python</span> & 
    <span class="word-sql">SQL</span>
  </h1>
</div>

<div class="stats">
  <div class="stat"><span class="stat-num">35+</span><br>Python</div>
  <div class="stat"><span class="stat-num">30+</span><br>SQL</div>
  <div class="stat"><span class="stat-num">6</span><br>Kurse</div>
</div>

<div class="cards">

<!-- Python Quiz -->
<a class="card card-py" href="PythonLearn/python.html">
  <div class="card-icon">🐍</div>
  <span class="card-tag tag-py">PYTHON</span>
  <h2>Python Quiz</h2>
</a>

<!-- Python Learn -->
<a class="card card-py" href="Python/kurs.html">
  <div class="card-icon">📘</div>
  <span class="card-tag tag-py">KURS</span>
  <h2>Python Learn</h2>
</a>

<!-- SQL Quiz -->
<a class="card card-sql" href="Sql/index.html">
  <div class="card-icon">🗄️</div>
  <span class="card-tag tag-sql">SQL</span>
  <h2>SQL Quiz</h2>
</a>

<!-- SQL Learn -->
<a class="card card-sql" href="SqlLearn/index.html">
  <div class="card-icon">📚</div>
  <span class="card-tag tag-sql">KURS</span>
  <h2>SQL Learn</h2>
</a>

<!-- Python Test 2 -->
<a class="card card-py" href="python2/index.html">
  <div class="card-icon">🧪</div>
  <span class="card-tag tag-py">TEST 2</span>
  <h2>Python Test 2</h2>
</a>

<!-- SQL Test 2 -->
<a class="card card-sql" href="sql2/index.html">
  <div class="card-icon">🧪</div>
  <span class="card-tag tag-sql">TEST 2</span>
  <h2>SQL Test 2</h2>
</a>

</div>

<footer>
  rrezz1 · built for success 💪
</footer>

</body>
</html>
