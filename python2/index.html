<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Sfida — Shkruaj & Ekzekuto</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<style>
:root {
  --bg: #0b0d12;
  --surface: #12151e;
  --surface2: #181c28;
  --surface3: #1e2333;
  --border: #242840;
  --border2: #2e3450;
  --green: #3ddc84;
  --green-dim: rgba(61,220,132,0.12);
  --green-glow: rgba(61,220,132,0.25);
  --blue: #6ab0ff;
  --orange: #ff9f43;
  --red: #ff6b6b;
  --yellow: #ffd93d;
  --purple: #a29bfe;
  --text: #dde3f0;
  --muted: #5a6380;
  --muted2: #8892b0;
  --code: #e0e6f8;
  --radius: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCANLINE OVERLAY ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events:none; z-index:999;
}

/* ── TOP PROGRESS ── */
#top-bar {
  position:fixed; top:0; left:0; right:0; height:3px;
  background: var(--border); z-index:200;
}
#top-fill {
  height:100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  width:0%; transition: width 0.5s ease;
}

/* ── HEADER ── */
header {
  position: relative;
  padding: 64px 48px 48px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(61,220,132,0.05) 0%, transparent 100%);
  overflow: hidden;
}

header::before {
  content: 'PYTHON';
  position:absolute;
  right:-20px; top:50%;
  transform: translateY(-50%);
  font-size: 180px;
  font-weight: 800;
  color: rgba(61,220,132,0.03);
  letter-spacing: -8px;
  pointer-events:none;
  user-select:none;
}

.hdr-inner { max-width: 1100px; margin: 0 auto; display:flex; align-items:center; gap:48px; flex-wrap:wrap; }

.hdr-left {}

.tag-pill {
  display:inline-flex; align-items:center; gap:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase;
  color: var(--green);
  border:1px solid rgba(61,220,132,0.3);
  background: rgba(61,220,132,0.06);
  padding: 6px 14px; border-radius:4px;
  margin-bottom: 20px;
}

.tag-pill::before { content:'●'; font-size:8px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

h1 {
  font-size: clamp(32px,5vw,60px);
  font-weight:800; letter-spacing:-2px; line-height:1.05;
  margin-bottom:12px;
}
h1 em { font-style:normal; color: var(--green); }

.hdr-sub {
  font-family:'JetBrains Mono',monospace;
  font-size:13px; color: var(--muted2);
  line-height:1.7;
}

.hdr-stats {
  display:flex; gap:32px; flex-wrap:wrap;
  margin-left:auto;
}

.stat-box {
  text-align:center;
  padding: 16px 24px;
  background: var(--surface);
  border:1px solid var(--border);
  border-radius: var(--radius);
}
.stat-box .num { font-size:36px; font-weight:800; color:var(--green); display:block; line-height:1; }
.stat-box .lbl { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:4px; display:block; }

/* ── PYODIDE LOADER ── */
#py-loader {
  position:fixed; inset:0; z-index:500;
  background: var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px;
}
#py-loader.hidden { display:none; }

.loader-logo {
  font-size:64px; font-weight:800; color:var(--green); letter-spacing:-4px;
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

.loader-bar-wrap { width:280px; height:4px; background: var(--border); border-radius:2px; }
.loader-bar { height:100%; background: linear-gradient(90deg,var(--green),var(--blue)); border-radius:2px; animation: load 3s ease forwards; }
@keyframes load { from{width:0%} to{width:100%} }

.loader-msg {
  font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted2);
}

/* ── FILTERS ── */
.filters {
  padding:20px 48px;
  display:flex; gap:8px; flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  background: var(--surface);
  position:sticky; top:3px; z-index:100;
}

.f-btn {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  padding:7px 16px; border-radius:4px;
  border:1px solid var(--border2);
  background:transparent; color:var(--muted); cursor:pointer;
  transition:all 0.18s;
}
.f-btn:hover { color:var(--text); border-color:var(--muted); }
.f-btn.active { border-color:var(--green); color:var(--green); background:var(--green-dim); }

.f-sep { width:1px; background:var(--border); margin: 0 4px; }

/* ── MAIN LAYOUT ── */
main {
  max-width:1100px; margin:0 auto;
  padding: 40px 48px 80px;
}

/* ── SECTION LABEL ── */
.sec-label {
  display:flex; align-items:center; gap:14px;
  margin: 48px 0 20px;
}
.sec-label:first-child { margin-top:0; }
.sec-chip {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  padding:4px 12px; border-radius:3px; white-space:nowrap;
}
.sec-line { flex:1; height:1px; background: var(--border); }

/* topic colors */
.tc-intro      { color:#3ddc84; background:rgba(61,220,132,0.1); }
.tc-strings    { color:#a29bfe; background:rgba(162,155,254,0.1); }
.tc-numbers    { color:#ffd93d; background:rgba(255,217,61,0.1); }
.tc-logic      { color:#6ab0ff; background:rgba(106,176,255,0.1); }
.tc-loops      { color:#ff9f43; background:rgba(255,159,67,0.1); }
.tc-structures { color:#fd79a8; background:rgba(253,121,168,0.1); }
.tc-functions  { color:#55efc4; background:rgba(85,239,196,0.1); }

/* ── CHALLENGE CARD ── */
.card {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius: var(--radius);
  overflow:hidden;
  margin-bottom:16px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border2); }
.card.done { border-color: rgba(61,220,132,0.35); }
.card.failed { border-color: rgba(255,107,107,0.25); }

/* card top bar */
.c-header {
  display:flex; align-items:center; gap:12px;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  user-select:none;
}
.c-header:hover { background: var(--surface2); }

.c-num {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:700; color:var(--muted);
  min-width:30px;
}
.c-title { font-size:14px; font-weight:700; flex:1; }
.c-diff {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  padding:3px 9px; border-radius:3px;
}
.d-easy   { background:rgba(61,220,132,0.1);  color:var(--green); }
.d-medium { background:rgba(255,217,61,0.1);  color:var(--yellow); }
.d-hard   { background:rgba(255,107,107,0.1); color:var(--red); }

.c-status {
  font-size:16px; width:22px; text-align:center;
  transition:all 0.3s;
}
.c-toggle {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--muted);
  transition:transform 0.25s;
}
.card.open .c-toggle { transform:rotate(90deg); }

/* card body */
.c-body {
  display:none;
  padding:20px;
  border-top:1px solid var(--border);
  animation: slideDown 0.2s ease;
}
.card.open .c-body { display:block; }
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

.c-desc {
  font-size:14px; line-height:1.7; color:var(--muted2);
  margin-bottom:16px;
}

/* expected output */
.expected-box {
  background: var(--bg);
  border:1px solid var(--border);
  border-left:3px solid var(--blue);
  border-radius:6px;
  padding:12px 16px;
  margin-bottom:16px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--blue);
}
.expected-box .lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }

/* hint box */
.hint-box {
  background: rgba(162,155,254,0.05);
  border:1px solid rgba(162,155,254,0.2);
  border-radius:6px;
  padding:12px 16px;
  margin-bottom:16px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--purple); line-height:1.7;
  display:none;
}
.hint-box.show { display:block; animation: slideDown 0.2s ease; }

/* editor wrapper */
.editor-wrap {
  border:1px solid var(--border);
  border-radius:6px; overflow:hidden;
  margin-bottom:12px;
  position:relative;
}

.editor-topbar {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px;
  background: var(--surface3);
  border-bottom:1px solid var(--border);
}
.dot { width:10px; height:10px; border-radius:50%; }
.dot-r{background:#ff5f56;} .dot-y{background:#ffbd2e;} .dot-g{background:#27c93f;}

.editor-lang {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-left:auto;
}

/* codemirror overrides */
.CodeMirror {
  height: 160px !important;
  font-family:'JetBrains Mono',monospace !important;
  font-size:13px !important;
  line-height:1.7 !important;
  background: #1a1f2e !important;
}
.CodeMirror-scroll { padding: 8px 0; }

/* action bar */
.action-bar {
  display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;
}

.btn-run {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:700; letter-spacing:1px;
  padding:10px 24px; border-radius:5px;
  border:none; cursor:pointer;
  background: var(--green);
  color: #0b1a12;
  transition:all 0.15s;
  display:flex; align-items:center; gap:8px;
}
.btn-run:hover { background:#5af0a0; transform:translateY(-1px); }
.btn-run:active { transform:translateY(0); }
.btn-run:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.btn-hint {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:700; letter-spacing:1px;
  padding:10px 20px; border-radius:5px;
  border:1px solid rgba(162,155,254,0.3);
  background:transparent; color:var(--purple); cursor:pointer;
  transition:all 0.15s;
}
.btn-hint:hover { background:rgba(162,155,254,0.08); border-color:var(--purple); }

.btn-reset {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:700; letter-spacing:1px;
  padding:10px 20px; border-radius:5px;
  border:1px solid var(--border2);
  background:transparent; color:var(--muted); cursor:pointer;
  transition:all 0.15s;
  margin-left:auto;
}
.btn-reset:hover { color:var(--red); border-color:var(--red); }

/* output terminal */
.output-wrap {
  border:1px solid var(--border);
  border-radius:6px; overflow:hidden;
}
.out-topbar {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.out-label {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted);
}
.out-badge {
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:10px; padding:2px 8px; border-radius:3px;
  display:none;
}
.out-badge.ok  { background:rgba(61,220,132,0.15); color:var(--green); display:inline; }
.out-badge.err { background:rgba(255,107,107,0.15); color:var(--red);   display:inline; }
.out-badge.chk { background:rgba(106,176,255,0.15); color:var(--blue);  display:inline; }

.output-content {
  background: var(--bg);
  padding:14px 16px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px; line-height:1.8;
  min-height:60px; max-height:200px; overflow-y:auto;
  white-space:pre-wrap; word-break:break-all;
  color: var(--code);
}
.output-content.success { color: var(--green); }
.output-content.error   { color: var(--red); }

/* score panel */
.score-panel {
  position:fixed; right:20px; bottom:20px; z-index:150;
  background: var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:14px 20px; text-align:center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  min-width:120px;
}
.sp-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.sp-num { font-size:28px; font-weight:800; color:var(--green); line-height:1; }
.sp-total { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); }

/* footer */
footer {
  text-align:center; padding:32px;
  border-top:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--muted);
}
footer span { color:var(--green); }

@media(max-width:700px){
  header,main,.filters{padding-left:20px;padding-right:20px;}
  .hdr-inner{flex-direction:column; gap:24px;}
  .hdr-stats{margin-left:0;}
  .score-panel{right:12px;bottom:12px;}
}
</style>
</head>
<body>

<!-- top progress -->
<div id="top-bar"><div id="top-fill"></div></div>

<!-- pyodide loader -->
<div id="py-loader">
  <div class="loader-logo">&gt;_</div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text)">Duke ngarkuar Python…</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-msg" id="loader-msg">Po inicializohet Pyodide runtime…</div>
</div>

<!-- score -->
<div class="score-panel">
  <div class="sp-label">Zgjidhur</div>
  <div class="sp-num" id="sp-num">0</div>
  <div class="sp-total" id="sp-total">/ 0</div>
</div>

<header>
  <div class="hdr-inner">
    <div class="hdr-left">
      <div class="tag-pill">Live Python Compiler</div>
      <h1>Shkruaj.<br><em>Ekzekuto.</em><br>Mëso.</h1>
      <p class="hdr-sub">
        35+ detyra Python me editor të integruar.<br>
        Shkruaj kodin tënd dhe shiko rezultatin menjëherë.
      </p>
    </div>
    <div class="hdr-stats">
      <div class="stat-box"><span class="num" id="st-total">0</span><span class="lbl">Detyra</span></div>
      <div class="stat-box"><span class="num" id="st-solved">0</span><span class="lbl">Zgjidhur</span></div>
      <div class="stat-box"><span class="num">7</span><span class="lbl">Tema</span></div>
    </div>
  </div>
</header>

<div class="filters" id="filters">
  <button class="f-btn active" onclick="filterBy('all',this)">Të Gjitha</button>
  <div class="f-sep"></div>
  <button class="f-btn" onclick="filterBy('intro',this)">Hyrje</button>
  <button class="f-btn" onclick="filterBy('strings',this)">Strings</button>
  <button class="f-btn" onclick="filterBy('numbers',this)">Numrat</button>
  <button class="f-btn" onclick="filterBy('logic',this)">Logjika</button>
  <button class="f-btn" onclick="filterBy('loops',this)">Loops</button>
  <button class="f-btn" onclick="filterBy('structures',this)">Strukturat</button>
  <button class="f-btn" onclick="filterBy('functions',this)">Funksionet</button>
</div>

<main id="main"></main>

<footer>Data With Baraa &middot; Python Course <span>2026</span> &middot; Powered by Pyodide</footer>

<script>
// ── CHALLENGES DATA ──
const CHALLENGES = [
  // HYRJE
  { id:1, topic:'intro', diff:'easy', title:'Hello, Botë!',
    desc:'Shkruaj kodin që printon fjalën <code>Pershendetje, Bote!</code> në ekran.',
    expected:'Pershendetje, Bote!',
    hint:'Përdor funksionin print() me tekst brenda thonjëzave.',
    starter:'# Shkruaj kodin tënd këtu\n',
    check: o => o.trim() === 'Pershendetje, Bote!'
  },
  { id:2, topic:'intro', diff:'easy', title:'Dy rreshta me print()',
    desc:'Printo emrin tënd në rreshtin e parë dhe moshën tënde në rreshtin e dytë.',
    expected:'Ana\n25',
    hint:'Përdor dy print() — çdo print() krijon rresht të ri automatikisht.',
    starter:'# Printo emrin\n# Printo moshën\n',
    check: o => o.trim().split('\n').length >= 2
  },
  { id:3, topic:'intro', diff:'easy', title:'Variablat dhe print()',
    desc:'Krijo dy variabla: <code>emri = "Python"</code> dhe <code>versioni = 3</code>. Pastaj i printo të dy.',
    expected:'Python\n3',
    hint:'Variabla ruhen me =. Pastaj print(emri) dhe print(versioni).',
    starter:'# Krijo variablat\n\n# Printo ato\n',
    check: o => o.includes('Python') && o.includes('3')
  },
  { id:4, topic:'intro', diff:'medium', title:'Escape Sequence \\n dhe \\t',
    desc:'Printo këtë me <b>një</b> print() të vetëm:<br><code>Linja 1<br>&nbsp;&nbsp;&nbsp;&nbsp;Linja 2</code>',
    expected:'Linja 1\n\tLinja 2',
    hint:'Përdor \\n për rresht të ri dhe \\t për tab brenda stringut.',
    starter:'print()\n',
    check: o => o.includes('Linja 1') && o.includes('Linja 2')
  },
  { id:5, topic:'intro', diff:'medium', title:'type() — Tipi i të dhënave',
    desc:'Printo tipin e këtyre vlerave: <code>42</code>, <code>3.14</code>, <code>"hello"</code>, <code>True</code>',
    expected:"<class 'int'>\n<class 'float'>\n<class 'str'>\n<class 'bool'>",
    hint:'print(type(42)) shfaq <class \'int\'>. Bëj kështu për secilën vlerë.',
    starter:'# Printo tipin e 4 vlerave\n',
    check: o => o.includes("int") && o.includes("float") && o.includes("str") && o.includes("bool")
  },

  // STRINGS
  { id:6, topic:'strings', diff:'easy', title:'len() dhe upper()',
    desc:'Krijo variablën <code>fjala = "python"</code>. Printo gjatësinë e saj dhe versionin me shkronja të mëdha.',
    expected:'6\nPYTHON',
    hint:'len(fjala) jep numrin e karaktereve. fjala.upper() e konverton.',
    starter:'fjala = "python"\n# Printo gjatësinë\n# Printo upper()\n',
    check: o => o.includes('6') && o.includes('PYTHON')
  },
  { id:7, topic:'strings', diff:'easy', title:'Indexing dhe Slicing',
    desc:'Nga stringu <code>s = "Programming"</code> printo: karakterin e parë, të fundit, dhe 4 karakteret e para.',
    expected:'P\ng\nProg',
    hint:'s[0]=i pari, s[-1]=i fundit, s[0:4]=katër të parët.',
    starter:'s = "Programming"\n',
    check: o => o.includes('P') && o.includes('g') && o.includes('Prog')
  },
  { id:8, topic:'strings', diff:'easy', title:'replace() dhe strip()',
    desc:'Merr stringun <code>"  hello world  "</code>. Hiq hapësirat dhe zëvendëso "world" me "Python". Printo rezultatin.',
    expected:'hello Python',
    hint:'Bashko strip() dhe replace() me chaining: s.strip().replace(...)',
    starter:'s = "  hello world  "\n',
    check: o => o.trim() === 'hello Python'
  },
  { id:9, topic:'strings', diff:'medium', title:'split() dhe join()',
    desc:'Ndaj stringun <code>"ana,ben,cara,dani"</code> me presje. Pastaj bashkoi me " - " dhe printo.',
    expected:'ana - ben - cara - dani',
    hint:'s.split(",") kthen listë. " - ".join(lista) i bashkon.',
    starter:'s = "ana,ben,cara,dani"\n',
    check: o => o.trim() === 'ana - ben - cara - dani'
  },
  { id:10, topic:'strings', diff:'medium', title:'f-strings',
    desc:'Krijo variablat <code>emri="Baraa"</code> dhe <code>kursi="Python"</code>. Printo: <code>Pershendetje, Baraa! Miresevini ne kursin Python.</code>',
    expected:'Pershendetje, Baraa! Miresevini ne kursin Python.',

// ── STATE ──
let pyodide = null;
let solved = 0;
const editors = {};
const cardOpen = {};
const TOTAL = CHALLENGES.length;

document.getElementById('st-total').textContent = TOTAL;
document.getElementById('sp-total').textContent = '/ ' + TOTAL;

const TOPICS = {
  intro:      { label:'Hyrje në Python',        cls:'tc-intro' },
  strings:    { label:'Strings',                cls:'tc-strings' },
  numbers:    { label:'Numrat',                 cls:'tc-numbers' },
  logic:      { label:'Logjika & Kushtet',      cls:'tc-logic' },
  loops:      { label:'Loops',                  cls:'tc-loops' },
  structures: { label:'Strukturat e të Dhënave',cls:'tc-structures' },
  functions:  { label:'Funksionet',             cls:'tc-functions' },
};
const DIFF_LABELS = { easy:'Lehtë', medium:'Mesatare', hard:'Vështirë' };

// ── BUILD UI ──
function buildUI() {
  const main = document.getElementById('main');
  const order = ['intro','strings','numbers','logic','loops','structures','functions'];
  let html = '';
  order.forEach(topic => {
    const qs = CHALLENGES.filter(c => c.topic === topic);
    if (!qs.length) return;
    const t = TOPICS[topic];
    html += `<div class="sec-label" data-sec="${topic}">
      <span class="sec-chip ${t.cls}">${t.label}</span>
      <div class="sec-line"></div>
    </div>`;
    qs.forEach(c => { html += cardHTML(c); });
  });
  main.innerHTML = html;

  // init editors
  CHALLENGES.forEach(c => {
    const ta = document.getElementById('ta-' + c.id);
    if (!ta) return;
    editors[c.id] = CodeMirror.fromTextArea(ta, {
      mode: 'python',
      theme: 'dracula',
      lineNumbers: true,
      indentUnit: 4,
      tabSize: 4,
      indentWithTabs: false,
      extraKeys: {
        'Tab': cm => cm.replaceSelection('    '),
        'Ctrl-Enter': () => runCode(c.id),
        'Cmd-Enter':  () => runCode(c.id),
      }
    });
  });
}

function cardHTML(c) {
  return `
  <div class="card" id="card-${c.id}" data-topic="${c.topic}">
    <div class="c-header" onclick="toggleCard(${c.id})">
      <span class="c-num">#${String(c.id).padStart(2,'0')}</span>
      <span class="c-title">${c.title}</span>
      <span class="c-diff d-${c.diff}">${DIFF_LABELS[c.diff]}</span>
      <span class="c-status" id="status-${c.id}">○</span>
      <span class="c-toggle">▶</span>
    </div>
    <div class="c-body" id="body-${c.id}">
      <p class="c-desc">${c.desc}</p>

      <div class="expected-box">
        <div class="lbl">// Output i Pritshëm</div>
        ${c.expected.replace(/\n/g,'<br>')}
      </div>

      <div class="hint-box" id="hint-${c.id}">💡 ${c.hint}</div>

      <div class="editor-wrap">
        <div class="editor-topbar">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
          <span class="editor-lang">python · ctrl+enter ekzekuto</span>
        </div>
        <textarea id="ta-${c.id}">${c.starter || ''}</textarea>
      </div>

      <div class="action-bar">
        <button class="btn-run" id="run-${c.id}" onclick="runCode(${c.id})">
          ▶ Ekzekuto
        </button>
        <button class="btn-hint" onclick="toggleHint(${c.id})">
          💡 Hint
        </button>
        <button class="btn-reset" onclick="resetCard(${c.id})">
          ↺ Reset
        </button>
      </div>

      <div class="output-wrap">
        <div class="out-topbar">
          <span class="out-label">// Output</span>
          <span class="out-badge" id="badge-${c.id}"></span>
        </div>
        <div class="output-content" id="out-${c.id}">Kodi nuk është ekzekutuar ende…</div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  const isOpen = card.classList.contains('open');
  card.classList.toggle('open', !isOpen);
  if (!isOpen && editors[id]) {
    setTimeout(() => editors[id].refresh(), 10);
  }
}

function toggleHint(id) {
  document.getElementById('hint-' + id).classList.toggle('show');
}

function resetCard(id) {
  const c = CHALLENGES.find(x => x.id === id);
  if (editors[id]) editors[id].setValue(c.starter || '');
  const out = document.getElementById('out-' + id);
  const badge = document.getElementById('badge-' + id);
  out.textContent = 'Kodi nuk është ekzekutuar ende…';
  out.className = 'output-content';
  badge.className = 'out-badge';
  badge.textContent = '';
}

async function runCode(id) {
  if (!pyodide) {
    alert('Pyodide ende po ngarkohet. Prit pak sekonda…');
    return;
  }
  const c = CHALLENGES.find(x => x.id === id);
  const code = editors[id] ? editors[id].getValue() : '';
  const btn = document.getElementById('run-' + id);
  const out = document.getElementById('out-' + id);
  const badge = document.getElementById('badge-' + id);
  const card = document.getElementById('card-' + id);
  const statusEl = document.getElementById('status-' + id);

  btn.disabled = true;
  btn.textContent = '⏳ Duke ekzekutuar…';
  out.textContent = '';
  out.className = 'output-content';
  badge.className = 'out-badge';

  let output = '';
  pyodide.globals.set('_captured', []);
  pyodide.runPython(`
import sys, io
_buf = io.StringIO()
sys.stdout = _buf
`);

  try {
    await pyodide.runPythonAsync(code);
    pyodide.runPython('sys.stdout = sys.__stdout__');
    output = pyodide.runPython('_buf.getvalue()');
    out.textContent = output || '(pa output)';

    // check correctness
    const isCorrect = c.check ? c.check(output) : true;
    if (isCorrect) {
      out.className = 'output-content success';
      badge.textContent = '✓ Saktë!';
      badge.className = 'out-badge ok';
      if (!card.classList.contains('done')) {
        card.classList.remove('failed');
        card.classList.add('done');
        statusEl.textContent = '✓';
        statusEl.style.color = 'var(--green)';
        solved++;
        updateScore();
      }
    } else {
      out.className = 'output-content';
      badge.textContent = '≠ Output nuk përputhet';
      badge.className = 'out-badge chk';
      card.classList.remove('done');
      card.classList.add('failed');
      statusEl.textContent = '✗';
      statusEl.style.color = 'var(--red)';
    }
  } catch (err) {
    pyodide.runPython('sys.stdout = sys.__stdout__');
    out.textContent = '⚠ ' + err.message;
    out.className = 'output-content error';
    badge.textContent = 'Error';
    badge.className = 'out-badge err';
    card.classList.remove('done');
    card.classList.add('failed');
    statusEl.textContent = '✗';
    statusEl.style.color = 'var(--red)';
  }

  btn.disabled = false;
  btn.textContent = '▶ Ekzekuto';
}

function updateScore() {
  document.getElementById('sp-num').textContent = solved;
  document.getElementById('st-solved').textContent = solved;
  const pct = solved / TOTAL * 100;
  document.getElementById('top-fill').style.width = pct + '%';
}

function filterBy(topic, btn) {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = (topic === 'all' || c.dataset.topic === topic) ? '' : 'none';
  });
  document.querySelectorAll('[data-sec]').forEach(s => {
    const show = topic === 'all' || s.dataset.sec === topic;
    s.style.display = show ? '' : 'none';
  });
}

// ── LOAD PYODIDE ──
async function initPyodide() {
  const msg = document.getElementById('loader-msg');
  msg.textContent = 'Po shkarkon Pyodide…';
  try {
    pyodide = await loadPyodide();
    msg.textContent = 'Python u ngarkua! Gati.';
    setTimeout(() => {
      document.getElementById('py-loader').classList.add('hidden');
      buildUI();
    }, 600);
  } catch(e) {
    msg.textContent = 'Gabim duke ngarkuar Pyodide: ' + e.message;
  }
}

initPyodide();
</script>
