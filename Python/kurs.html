
<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baraa Python Bootcamp — Mëso Hap pas Hapi</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c14;
  --surface: #13131f;
  --card: #1b1b2a;
  --border: #272740;
  --accent: #5b8dee;
  --accent2: #e05bde;
  --accent3: #5bedbd;
  --warn: #f0a04b;
  --text: #dde0f0;
  --muted: #6a6a90;
  --dim: #3a3a58;
  --success: #5bedd2;
  --error: #ed5b7b;

  --s1: #5b8dee;   /* foundations */
  --s2: #e05bde;   /* strings */
  --s3: #f0a04b;   /* numbers */
  --s4: #5bedbd;   /* logic */
  --s5: #ed5b7b;   /* conditions */
  --s6: #a07cf0;   /* loops */
  --s7: #5be8ed;   /* data structures */
  --s8: #f0d65b;   /* functions */
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* noise */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(12,12,20,.92);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:.85rem 2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.logo{
  font-family:'DM Serif Display',serif;
  font-size:1.35rem;letter-spacing:-.5px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;
}
.logo span{font-family:'DM Sans',sans-serif;font-weight:300;font-size:.8rem;
  -webkit-text-fill-color:var(--muted);letter-spacing:0;margin-left:.4rem;}

.hdr-right{display:flex;align-items:center;gap:1.2rem;}
.overall-prog{
  display:flex;align-items:center;gap:.6rem;
  font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);
}
.prog-pill{
  width:100px;height:5px;background:var(--border);border-radius:99px;overflow:hidden;
}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:99px;transition:width .5s ease;}

/* ── SIDEBAR NAV ── */
.layout{display:flex;min-height:calc(100vh - 57px);position:relative;z-index:1;}

.sidebar{
  width:240px;flex-shrink:0;
  position:sticky;top:57px;height:calc(100vh - 57px);
  overflow-y:auto;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:1.2rem 0;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

.sidebar-label{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:.1em;
  padding:.4rem 1.2rem;margin-bottom:.2rem;
}
.nav-item{
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem 1.2rem;cursor:pointer;
  transition:background .15s;border-left:3px solid transparent;
  font-size:.83rem;font-weight:500;color:var(--muted);
}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
.nav-item.active{color:var(--text);background:rgba(255,255,255,.05);}
.nav-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.nav-progress{
  margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--dim);
}
.nav-item.done-nav .nav-progress{color:var(--success);}

/* ── MAIN CONTENT ── */
.content{flex:1;max-width:820px;padding:2rem 2.5rem 6rem;margin:0 auto;}

/* ── SECTION BLOCK ── */
.section-block{margin-bottom:3.5rem;scroll-margin-top:80px;}

.section-hero{
  display:flex;align-items:flex-start;gap:1.2rem;
  margin-bottom:1.8rem;padding-bottom:1.2rem;
  border-bottom:1px solid var(--border);
}
.section-num{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;font-size:1.3rem;
}
.section-info{flex:1;}
.section-name{
  font-family:'DM Serif Display',serif;font-size:1.5rem;
  letter-spacing:-.5px;margin-bottom:.25rem;
}
.section-desc{font-size:.85rem;color:var(--muted);line-height:1.65;max-width:520px;}
.section-topics{
  display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.7rem;
}
.topic-pill{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  padding:.2rem .6rem;border-radius:99px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);
}

/* ── LESSON CARD ── */
.lesson{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;margin-bottom:1rem;overflow:hidden;
  transition:border-color .2s;
}
.lesson:hover{border-color:var(--dim);}
.lesson.learned{border-color:rgba(91,237,210,.3);}

.lesson-head{
  display:flex;align-items:flex-start;gap:.9rem;
  padding:1rem 1.1rem;cursor:pointer;user-select:none;
}
.lesson-icon{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
}
.lesson-meta{flex:1;}
.lesson-title{font-size:.92rem;font-weight:700;margin-bottom:.15rem;}
.lesson-sub{font-size:.75rem;color:var(--muted);}

.lesson-check{
  width:24px;height:24px;border-radius:7px;flex-shrink:0;
  border:1.5px solid var(--border);cursor:pointer;
  transition:all .2s;background:transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:transparent;margin-top:2px;
}
.lesson-check.checked{background:var(--success);border-color:var(--success);color:#0c1a18;}

.lesson-toggle{
  width:24px;height:24px;border:none;background:transparent;
  color:var(--muted);font-size:.8rem;cursor:pointer;
  transition:transform .25s;flex-shrink:0;margin-top:2px;
}
.lesson-toggle.open{transform:rotate(180deg);}

/* ── LESSON BODY ── */
.lesson-body{display:none;padding:0 1.1rem 1.1rem;border-top:1px solid var(--border);}
.lesson-body.open{display:block;}

/* concept block */
.concept{
  margin:.9rem 0;background:var(--surface);
  border-radius:10px;padding:1rem 1.1rem;
  border-left:3px solid var(--dim);
}
.concept h4{
  font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin-bottom:.6rem;font-weight:700;
  font-family:'JetBrains Mono',monospace;
}
.concept p{font-size:.87rem;color:var(--text);line-height:1.7;}
.concept ul{padding-left:1.1rem;}
.concept ul li{font-size:.87rem;color:var(--text);line-height:1.7;margin-bottom:.2rem;}

/* code block */
.codeblock{
  background:#09090f;border:1px solid var(--border);
  border-radius:10px;padding:.85rem 1rem;margin:.7rem 0;
  font-family:'JetBrains Mono',monospace;font-size:.8rem;
  color:#c8c8e8;white-space:pre;overflow-x:auto;line-height:1.65;
}
.codeblock .kw{color:#7ba4f7;}
.codeblock .fn{color:#e2a55b;}
.codeblock .st{color:#7cf0c4;}
.codeblock .cm{color:#4a4a70;}
.codeblock .nm{color:#f07ca8;}

/* tip */
.tip{
  background:rgba(91,141,238,.08);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;padding:.65rem .9rem;margin:.7rem 0;
  font-size:.83rem;color:var(--text);line-height:1.65;
}
.tip strong{color:var(--accent);margin-right:.3rem;}

/* warning */
.warn-box{
  background:rgba(240,160,75,.08);border-left:3px solid var(--warn);
  border-radius:0 8px 8px 0;padding:.65rem .9rem;margin:.7rem 0;
  font-size:.83rem;color:var(--text);line-height:1.65;
}
.warn-box strong{color:var(--warn);margin-right:.3rem;}

/* visual diagram */
.visual{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:1rem;margin:.7rem 0;
  text-align:center;
}
.visual svg{max-width:100%;height:auto;}

/* mini challenge */
.challenge{
  background:rgba(240,214,91,.05);border:1px solid rgba(240,214,91,.2);
  border-radius:10px;padding:.9rem 1rem;margin:1rem 0;
}
.challenge-label{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  color:#f0d65b;text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:.5rem;display:block;
}
.challenge-q{font-size:.87rem;color:var(--text);line-height:1.65;margin-bottom:.7rem;}

textarea.try-code{
  width:100%;min-height:90px;resize:vertical;
  background:#09090f;border:1px solid var(--border);border-radius:8px;
  color:var(--success);font-family:'JetBrains Mono',monospace;
  font-size:.78rem;padding:.7rem .9rem;line-height:1.6;
  outline:none;transition:border-color .2s;tab-size:4;
  margin-bottom:.6rem;
}
textarea.try-code:focus{border-color:var(--accent);}

.challenge-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem;}

.btn{
  padding:.38rem .95rem;border-radius:7px;border:none;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.77rem;
  cursor:pointer;transition:all .18s;
}
.btn-check{background:var(--accent);color:#fff;}
.btn-check:hover{filter:brightness(1.15);}
.btn-answer{background:var(--surface);border:1px solid var(--border);color:var(--muted);}
.btn-answer:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-mark{background:var(--surface);border:1px solid var(--border);color:var(--muted);}
.btn-mark.marked{background:rgba(91,237,210,.1);border-color:rgba(91,237,210,.3);color:var(--success);}

.result-out{
  display:none;background:#09090f;border:1px solid var(--border);
  border-radius:8px;padding:.65rem .9rem;
  font-family:'JetBrains Mono',monospace;font-size:.78rem;
  white-space:pre-wrap;line-height:1.6;
}
.result-out.show{display:block;}
.result-out.pass{border-color:rgba(91,237,210,.4);color:var(--success);}
.result-out.fail{border-color:rgba(237,91,123,.4);color:var(--error);}

.answer-box{
  display:none;background:#09090f;border:1px solid rgba(224,91,222,.2);
  border-radius:8px;padding:.65rem .9rem;margin-top:.4rem;
  font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent2);
  white-space:pre-wrap;line-height:1.6;
}
.answer-box.show{display:block;}
.answer-label{color:var(--muted);font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:.3rem;}

/* ── MOBILE HIDE SIDEBAR ── */
@media(max-width:700px){
  .sidebar{display:none;}
  .content{padding:1.5rem 1rem 5rem;}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.section-block{animation:fadeUp .4s ease both;}

footer{
  text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;
  border-top:1px solid var(--border);position:relative;z-index:1;
}
footer a{color:var(--accent);text-decoration:none;}
</style>
</head>

<div class="codeblock"><span class="cm"># Krijo variabla</span>

        challenge: {
          q: 'Krijo listën e numrave 1-10. Me list comprehension bëj listën e kubeve. Printo minimumit, maksimumit dhe shumës.',
          answer: 'nums = list(range(1, 11))\ncubes = [x**3 for x in nums]\nprint(min(nums), max(nums), sum(nums))',
          test: c => c.includes('for') && c.includes('**') || c.includes('min') || c.includes('max')
        }
      },
      {
        id: 'l13', title: 'Tuples, Sets & Dictionaries', sub: 'Zgjedh strukturën e duhur',
        content: `

<div class="concept"><h4>📊 Kur të përdorësh çfarë?</h4>

        challenge: {
          q: 'Krijo dict për një student (emri, nota, lëndët[lista]). Printo çdo çelës-vlerë me .items().',
          answer: 'student = {"emri": "Blerim", "nota": 9.5, "lëndët": ["Python", "Math"]}\nfor k, v in student.items():\n    print(f"{k}: {v}")',
          test: c => c.includes('{') && c.includes(':') && c.includes('.items()')

      }
    ]
  },
  {
    id: 's8', color: '#f0d65b', emoji: '⚙️',
    name: 'Functions',
    desc: 'Shkruaj funksione të pastra, parametra, return, *args, **kwargs, lambda, scope.',
    topics: ['def', 'Parameters', 'return', '*args/**kwargs', 'lambda', 'Scope'],
    lessons: [
      {
        id: 'l14', title: 'Funksionet Bazë', sub: 'def, parametra, return values',
        content: `
<div class="concept"><h4>💡 Pse funksionet?</h4>
<ul>
<li><strong>DRY</strong> — Don't Repeat Yourself</li>
<li>Kodi bëhet i lexueshëm dhe i testuar</li>
<li>Baraa thotë: "Nëse e shkruaj 2 herë, e bëj funksion"</li>
</ul>
</div>

<div class="codeblock"><span class="cm"># Funksion bazë</span>
<span class="kw">def</span> <span class="fn">greet</span>(name):
    <span class="kw">return</span> <span class="st">f"Mirëdita, {name}!"</span>

<span class="fn">print</span>(<span class="fn">greet</span>(<span class="st">"Baraa"</span>))   <span class="cm"># Mirëdita, Baraa!</span>

<span class="cm"># Default values</span>
<span class="kw">def</span> <span class="fn">power</span>(base, exp=<span class="nm">2</span>):
    <span class="kw">return</span> base ** exp

<span class="fn">print</span>(<span class="fn">power</span>(<span class="nm">3</span>))     <span class="cm"># 9  (exp default = 2)</span>
<span class="fn">print</span>(<span class="fn">power</span>(<span class="nm">2</span>, <span class="nm">10</span>)) <span class="cm"># 1024</span>

<span class="cm"># *args — numër i papërcaktuar argumentesh</span>
<span class="kw">def</span> <span class="fn">total</span>(*args):
    <span class="kw">return</span> <span class="fn">sum</span>(args)

<span class="fn">print</span>(<span class="fn">total</span>(<span class="nm">1</span>, <span class="nm">2</span>, <span class="nm">3</span>, <span class="nm">4</span>))  <span class="cm"># 10</span>

<span class="cm"># **kwargs — argumentet me emër</span>
<span class="kw">def</span> <span class="fn">profile</span>(**kwargs):
    <span class="kw">for</span> k, v <span class="kw">in</span> kwargs.<span class="fn">items</span>():
        <span class="fn">print</span>(<span class="st">f"{k}: {v}"</span>)

<span class="fn">profile</span>(name=<span class="st">"Baraa"</span>, role=<span class="st">"Engineer"</span>)
</div>`,
        challenge: {
          q: 'Shkruaj funksionin celsius_to_f(c) dhe f_to_celsius(f). Testo me: 100°C → 212°F dhe 32°F → 0°C.',
          answer: 'def celsius_to_f(c):\n    return (c * 9/5) + 32\n\ndef f_to_celsius(f):\n    return (f - 32) * 5/9\n\nprint(celsius_to_f(100))\nprint(f_to_celsius(32))',
          test: c => c.includes('def') && c.includes('return') && (c.includes('9/5') || c.includes('5/9'))
        }
      },
      {
        id: 'l15', title: 'Lambda, Scope & Closures', sub: 'Funksione anonime dhe scope i variablave',
        content: `
<div class="codeblock"><span class="cm"># Lambda — funksion i shkurtër me një shprehje</span>
square = <span class="kw">lambda</span> x: x**<span class="nm">2</span>
add    = <span class="kw">lambda</span> a, b: a + b

<span class="fn">print</span>(square(<span class="nm">5</span>))    <span class="cm"># 25</span>
<span class="fn">print</span>(add(<span class="nm">3</span>, <span class="nm">4</span>))   <span class="cm"># 7</span>

<span class="cm"># Përdorim klasik — sorted me key</span>
students = [(<span class="st">"Ana"</span>, <span class="nm">85</span>), (<span class="st">"Beni"</span>, <span class="nm">92</span>), (<span class="st">"Cara"</span>, <span class="nm">78</span>)]
<span class="fn">sorted</span>(students, key=<span class="kw">lambda</span> x: x[<span class="nm">1</span>], reverse=<span class="kw">True</span>)

<span class="fn">print</span>(x)          <span class="cm"># global</span>

    counter += <span class="nm">1</span>
</div>

<div class="warn-box"><strong>⚠️ Baraa paralajmëron:</strong> Mos abuzoni me global! Prefero të kalosh dhe të kthesh vlera me parametra/return. Kodi bëhet i paparashikueshëm me shumë global.</div>`,
        challenge: {
          q: 'Krijo listën e studentëve me (emri, GPA). Sorto sipas GPA nga e larta me lambda. Printo listën.',
          answer: 'students = [("Ana", 3.8), ("Beni", 3.9), ("Cara", 3.5)]\nsorted_s = sorted(students, key=lambda x: x[1], reverse=True)\nfor s in sorted_s:\n    print(s)',
          test: c => c.includes('lambda') && c.includes('sorted')

];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let learnedSet = new Set(JSON.parse(localStorage.getItem('baraa_py_learned') || '[]'));

function saveLearned(){ localStorage.setItem('baraa_py_learned', JSON.stringify([...learnedSet])); }

function updateProgress(){
  const total = sections.reduce((a, s) => a + s.lessons.length, 0);
  const done  = learnedSet.size;
  document.getElementById('prog-lbl').textContent = `${done}/${total} mësuar`;
  document.getElementById('prog-fill').style.width = (done/total*100)+'%';

  // Update sidebar nav items
  sections.forEach(sec => {
    const secDone = sec.lessons.filter(l => learnedSet.has(l.id)).length;
    const navItem = document.querySelector(`[data-nav="${sec.id}"]`);
    if(navItem){
      const progEl = navItem.querySelector('.nav-progress');
      if(progEl) progEl.textContent = `${secDone}/${sec.lessons.length}`;
      navItem.classList.toggle('done-nav', secDone === sec.lessons.length);
    }
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

// Sidebar
const sidebar = document.getElementById('sidebar');
sections.forEach((sec, i) => {
  const div = document.createElement('div');
  div.className = 'nav-item';
  div.dataset.nav = sec.id;
  div.innerHTML = `<div class="nav-dot" style="background:${sec.color}22;border:2px solid ${sec.color}55;"></div>${sec.name.split(' ').slice(-1)[0]}<span class="nav-progress">0/${sec.lessons.length}</span>`;
  div.style.setProperty('border-left-color', 'transparent');
  div.onclick = () => {
    document.getElementById(sec.id)?.scrollIntoView({behavior:'smooth', block:'start'});
  };
  sidebar.appendChild(div);
});

// Main content
const content = document.getElementById('content');
sections.forEach((sec, si) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'section-block';
  secDiv.id = sec.id;

  secDiv.innerHTML = `
    <div class="section-hero">
      <div class="section-num" style="background:${sec.color}15;color:${sec.color};">${sec.emoji}</div>
      <div class="section-info">
        <div style="font-size:.72rem;font-family:'JetBrains Mono',monospace;color:${sec.color};letter-spacing:.1em;margin-bottom:.2rem;">SEKSIONI ${si+1}</div>
        <div class="section-name" style="color:${sec.color}">${sec.name}</div>
        <div class="section-desc">${sec.desc}</div>
        <div class="section-topics">
          ${sec.topics.map(t => `<span class="topic-pill">${t}</span>`).join('')}
        </div>
      </div>
    </div>
    ${sec.lessons.map((lesson, li) => renderLesson(lesson, sec.color, si*20+li+1)).join('')}
  `;

  content.appendChild(secDiv);
});

function renderLesson(lesson, color, num){
  const learned = learnedSet.has(lesson.id);
  return `
  <div class="lesson${learned?' learned':''}" id="card-${lesson.id}">
    <div class="lesson-head" onclick="toggleLesson('${lesson.id}')">
      <div class="lesson-icon" style="background:${color}15;color:${color};">${num}</div>
      <div class="lesson-meta">
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-sub">${lesson.sub}</div>
      </div>
      <div class="lesson-check${learned?' checked':''}" id="chk-${lesson.id}"
           onclick="event.stopPropagation();markLearned('${lesson.id}')">✓</div>
      <button class="lesson-toggle" id="tog-${lesson.id}">▼</button>
    </div>
    <div class="lesson-body" id="body-${lesson.id}">
      ${lesson.content}
      ${lesson.challenge ? renderChallenge(lesson.challenge, lesson.id, color) : ''}
      <div style="margin-top:.8rem;display:flex;gap:.5rem;">
        <button class="btn btn-mark${learned?' marked':''}" id="mbtn-${lesson.id}"
                onclick="markLearned('${lesson.id}')">
          ${learned ? '✓ E mësuar' : 'Shëno si e mësuar'}
        </button>
      </div>
    </div>
  </div>`;
}

function renderChallenge(ch, lid, color){
  return `
  <div class="challenge" style="border-color:${color}33;background:${color}08;">
    <span class="challenge-label" style="color:${color};">✏️ MINI SFIDË</span>
    <div class="challenge-q">${ch.q}</div>
    <textarea class="try-code" id="trycode-${lid}" placeholder="# Shkruaj zgjidhjen këtu..." spellcheck="false"></textarea>
    <div class="challenge-actions">
      <button class="btn btn-check" style="background:${color}" onclick="checkChallenge('${lid}')">▶ Kontrollo</button>
      <button class="btn btn-answer" onclick="toggleAnswer('${lid}')">👁 Zgjidhja</button>
    </div>
    <div class="result-out" id="res-${lid}"></div>
    <div class="answer-box" id="ans-${lid}">
      <span class="answer-label">Zgjidhja zyrtare</span>${ch.answer}
    </div>
  </div>`;
}

// ── Interactions ─────────────────────────────────────────
function toggleLesson(id){
  document.getElementById(`body-${id}`).classList.toggle('open');
  document.getElementById(`tog-${id}`).classList.toggle('open');
}

function checkChallenge(lid){
  const allSections = sections;
  let ch = null;
  for(const sec of allSections){
    const lesson = sec.lessons.find(l => l.id === lid);
    if(lesson){ ch = lesson.challenge; break; }
  }
  if(!ch) return;

  const code = document.getElementById(`trycode-${lid}`).value.trim();
  const res = document.getElementById(`res-${lid}`);
  res.className = 'result-out show';

  if(!code){
    res.classList.add('fail');
    res.textContent = '⚠ Shkruaj diçka fillimisht!';
    return;
  }

  const passed = ch.test(code);
  if(passed){
    res.classList.add('pass');
    res.textContent = '✓ Shumë mirë! Kodi kalon testin. Shëno mësimin si të mësuar.';
    // auto-learn
    if(!learnedSet.has(lid)){
      learnedSet.add(lid);
      saveLearned();
      updateProgress();
      refreshLearnedState(lid);
    }
  } else {
    res.classList.add('fail');
    res.textContent = '✗ Provo sërish — ose shiko zgjidhjen.';
  }
}

function toggleAnswer(lid){
  document.getElementById(`ans-${lid}`).classList.toggle('show');
}

function markLearned(id){
  if(learnedSet.has(id)) learnedSet.delete(id);
  else learnedSet.add(id);
  saveLearned();
  updateProgress();
  refreshLearnedState(id);
}

function refreshLearnedState(id){
  const card = document.getElementById(`card-${id}`);
  if(!card) return;
  const done = learnedSet.has(id);
  card.classList.toggle('learned', done);
  const chk = document.getElementById(`chk-${id}`);
  if(chk) chk.classList.toggle('checked', done);
  const mbtn = document.getElementById(`mbtn-${id}`);
  if(mbtn){
    mbtn.textContent = done ? '✓ E mësuar' : 'Shëno si e mësuar';
    mbtn.className = `btn btn-mark${done?' marked':''}`;
  }
}

// Tab key
document.addEventListener('keydown', e => {
  if(e.key === 'Tab' && e.target.classList.contains('try-code')){
    e.preventDefault();
    const s = e.target.selectionStart, en = e.target.selectionEnd;
    e.target.value = e.target.value.substring(0,s) + '    ' + e.target.value.substring(en);
    e.target.selectionStart = e.target.selectionEnd = s + 4;
  }
});

// Init
updateProgress();
</script>
</body>
</html>
