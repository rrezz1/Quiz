<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 100 Detyra</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #111118;
    --border: #1e1e2e;
    --accent: #f7c948;
    --accent2: #4ecca3;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --easy: #4ecca3;
    --mid: #f7c948;
    --hard: #ff6b6b;
    --code-bg: #0d0d15;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -80px; left: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(247,201,72,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(78,204,163,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index:1; }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  h1 {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 12px;
  }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 16px; }
  .stats {
    display: flex; gap: 32px; margin-top: 28px; flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.easy { background: var(--easy); }
  .dot.mid { background: var(--mid); }
  .stat-label { font-size: 13px; color: var(--muted); }
  .stat-val { font-size: 13px; font-weight: 700; }

  .filters {
    padding: 24px 40px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    max-width: 1200px; margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(247,201,72,0.06);
  }
  .search-box {
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 4px;
    width: 220px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent2); }
  .search-box::placeholder { color: var(--muted); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    display: flex; flex-direction: column;
  }
  .card:hover { border-color: rgba(247,201,72,0.3); transform: translateY(-2px); }
  .card.solved { border-color: rgba(78,204,163,0.4); }
  .card-header {
    padding: 16px 20px 12px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 3px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
    flex: 1;
  }
  .level-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .level-easy { background: rgba(78,204,163,0.15); color: var(--easy); }
  .level-mid { background: rgba(247,201,72,0.15); color: var(--mid); }

  .code-area {
    margin: 0 16px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .code-label {
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
  textarea.code-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    line-height: 1.6;
  }
  .card-footer {
    padding: 12px 16px 16px;
    display: flex; gap: 8px; align-items: center;
    margin-top: auto;
  }
  .run-btn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .run-btn:hover { background: #ffd966; transform: scale(1.03); }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--muted); color: var(--text); }
  .solved-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--easy);
    display: none;
    align-items: center; gap: 4px;
  }
  .card.solved .solved-badge { display: flex; }

  .output-area {
    margin: 0 16px 16px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: none;
  }
  .output-area.visible { display: block; }
  .output-label {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .output-content {
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 150px;
    overflow-y: auto;
  }
  .output-content.success { color: var(--easy); }
  .output-content.error { color: var(--hard); }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 18px;
    display: none;
  }

  footer {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  @media(max-width:600px){
    header, .filters, main { padding-left: 20px; padding-right: 20px; }
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<header>
  <div class="header-inner">
    <div class="badge">🐍 Python</div>
    <h1>100 <span>Detyra</span></h1>
    <p class="subtitle">Nga Easy deri në Mid — ekzekuto direkt në browser</p>
    <div class="stats">
      <div class="stat"><div class="dot easy"></div><span class="stat-label">Easy:</span><span class="stat-val">50 detyra</span></div>
      <div class="stat"><div class="dot mid"></div><span class="stat-label">Mid:</span><span class="stat-val">50 detyra</span></div>
      <div class="stat" id="solvedStat"><span class="stat-label">✅ Zgjidhur:</span><span class="stat-val" id="solvedCount">0</span>/100</div>
    </div>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="filterCards('all', this)">Të gjitha</button>
  <button class="filter-btn" onclick="filterCards('easy', this)">Easy</button>
  <button class="filter-btn" onclick="filterCards('mid', this)">Mid</button>
  <button class="filter-btn" onclick="filterCards('solved', this)">✅ Zgjidhur</button>
  <input class="search-box" id="searchBox" placeholder="🔍 Kërko detyrë..." oninput="searchCards()">
</div>

<main id="cardsGrid"></main>
<div class="no-results" id="noResults">Asnjë detyrë nuk u gjet 😕</div>

<footer>
  <a href="sql100.html">🗄️ Shko te SQL 100 Detyra →</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<script>

  {n:2, title:"Mbledh dy numra", level:"easy", code:`a = 5\nb = 3\nprint(a + b)`, solution:`a = 5\nb = 3\nprint(a + b)`},

  {n:5, title:"Pjesëto dy numra", level:"easy", code:`a = 20\nb = 4\nprint(a / b)`, solution:`a = 20\nb = 4\nprint(a / b)`},
  {n:6, title:"Fuqi e numrit (2^10)", level:"easy", code:`print(2 ** 10)`, solution:`print(2 ** 10)`},

  {n:12, title:"Uppercase dhe Lowercase", level:"easy", code:`s = "Python"\nprint(s.upper())\nprint(s.lower())`, solution:`s = "Python"\nprint(s.upper())\nprint(s.lower())`},
  {n:13, title:"Bashko dy stringje", level:"easy", code:`a = "Hello"\nb = " World"\nprint(a + b)`, solution:`a = "Hello"\nb = " World"\nprint(a + b)`},
  {n:14, title:"Shtimi i elementeve në listë", level:"easy", code:`lst = [1, 2, 3]\nlst.append(4)\nprint(lst)`, solution:`lst = [1, 2, 3]\nlst.append(4)\nprint(lst)`},
  {n:15, title:"Gjatësia e listës", level:"easy", code:`lst = [10, 20, 30, 40, 50]\nprint(len(lst))`, solution:`lst = [10, 20, 30, 40, 50]\nprint(len(lst))`},

  {n:19, title:"Max dhe Min i listës", level:"easy", code:`lst = [3, 1, 4, 1, 5, 9, 2, 6]\nprint(max(lst))\nprint(min(lst))`, solution:`lst = [3, 1, 4, 1, 5, 9, 2, 6]\nprint(max(lst))\nprint(min(lst))`},

  {n:22, title:"Numër çift apo tek", level:"easy", code:`n = 7\nif n % 2 == 0:\n    print("Cift")\nelse:\n    print("Tek")`, solution:`n = 7\nif n % 2 == 0:\n    print("Cift")\nelse:\n    print("Tek")`},
  {n:23, title:"While loop - numëro 1-5", level:"easy", code:`i = 1\nwhile i <= 5:\n    print(i)\n    i += 1`, solution:`i = 1\nwhile i <= 5:\n    print(i)\n    i += 1`},

  {n:26, title:"Funksion me return", level:"easy", code:`def katrori(x):\n    return x * x\n\nprint(katrori(7))`, solution:`def katrori(x):\n    return x * x\n\nprint(katrori(7))`},
  {n:27, title:"Dictionary - krijo dhe akseso", level:"easy", code:`person = {"emri": "Andi", "mosha": 25}\nprint(person["emri"])\nprint(person["mosha"])`, solution:`person = {"emri": "Andi", "mosha": 25}\nprint(person["emri"])\nprint(person["mosha"])`},
  {n:28, title:"Shto çelës në dictionary", level:"easy", code:`d = {"a": 1}\nd["b"] = 2\nprint(d)`, solution:`d = {"a": 1}\nd["b"] = 2\nprint(d)`},
  {n:29, title:"Kontrollo nëse çelësi ekziston", level:"easy", code:`d = {"x": 10, "y": 20}\nprint("x" in d)\nprint("z" in d)`, solution:`d = {"x": 10, "y": 20}\nprint("x" in d)\nprint("z" in d)`},

  {n:69, title:"Binary search", level:"mid", code:`def binary_search(lst, target):\n    left, right = 0, len(lst) - 1\n    while left <= right:\n        mid = (left + right) // 2\n        if lst[mid] == target:\n            return mid\n        elif lst[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return -1\n\nlst = [1, 3, 5, 7, 9, 11, 13]\nprint(binary_search(lst, 7))\nprint(binary_search(lst, 4))`, solution:`def binary_search(lst, target):\n    left, right = 0, len(lst) - 1\n    while left <= right:\n        mid = (left + right) // 2\n        if lst[mid] == target:\n            return mid\n        elif lst[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return -1\n\nlst = [1, 3, 5, 7, 9, 11, 13]\nprint(binary_search(lst, 7))\nprint(binary_search(lst, 4))`},

  {n:86, title:"Linked List e thjeshtë", level:"mid", code:`class Node:\n    def __init__(self, val):\n        self.val = val\n        self.next = None\n\nclass LinkedList:\n    def __init__(self):\n        self.head = None\n    def append(self, val):\n        node = Node(val)\n        if not self.head:\n            self.head = node\n            return\n        cur = self.head\n        while cur.next:\n            cur = cur.next\n        cur.next = node\n    def shtyp(self):\n        cur = self.head\n        while cur:\n            print(cur.val, end=" -> ")\n            cur = cur.next\n        print("None")\n\nll = LinkedList()\nll.append(1)\nll.append(2)\nll.append(3)\nll.shtyp()`, solution:`class Node:\n    def __init__(self, val):\n        self.val = val\n        self.next = None\n\nclass LinkedList:\n    def __init__(self):\n        self.head = None\n    def append(self, val):\n        node = Node(val)\n        if not self.head:\n            self.head = node\n            return\n        cur = self.head\n        while cur.next:\n            cur = cur.next\n        cur.next = node\n    def shtyp(self):\n        cur = self.head\n        while cur:\n            print(cur.val, end=" -> ")\n            cur = cur.next\n        print("None")\n\nll = LinkedList()\nll.append(1)\nll.append(2)\nll.append(3)\nll.shtyp()`},

  {n:90, title:"Merge sort", level:"mid", code:`def merge_sort(lst):\n    if len(lst) <= 1:\n        return lst\n    mid = len(lst) // 2\n    left = merge_sort(lst[:mid])\n    right = merge_sort(lst[mid:])\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] <= right[j]:\n            result.append(left[i]); i += 1\n        else:\n            result.append(right[j]); j += 1\n    result.extend(left[i:])\n    result.extend(right[j:])\n    return result\n\nprint(merge_sort([38, 27, 43, 3, 9, 82, 10]))`, solution:`def merge_sort(lst):\n    if len(lst) <= 1:\n        return lst\n    mid = len(lst) // 2\n    left = merge_sort(lst[:mid])\n    right = merge_sort(lst[mid:])\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] <= right[j]:\n            result.append(left[i]); i += 1\n        else:\n            result.append(right[j]); j += 1\n    result.extend(left[i:])\n    result.extend(right[j:])\n    return result\n\nprint(merge_sort([38, 27, 43, 3, 9, 82, 10]))`},

let solved = JSON.parse(localStorage.getItem('py_solved') || '[]');
let activeFilter = 'all';

function saveState() {
  localStorage.setItem('py_solved', JSON.stringify(solved));
}

function updateProgress() {
  const pct = (solved.length / 100) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('solvedCount').textContent = solved.length;
}

function runPython(n, code) {
  const outputDiv = document.getElementById(`out-${n}`);
  const outputContent = document.getElementById(`out-content-${n}`);
  outputDiv.classList.add('visible');
  outputContent.className = 'output-content';
  outputContent.textContent = '▶ Running...';
  
  let output = '';
  
  Sk.configure({
    output: (text) => { output += text; },
    read: (x) => {
      if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
        throw "File not found: '" + x + "'";
      return Sk.builtinFiles["files"][x];
    }
  });
  
  Sk.misceval.asyncToPromise(() => Sk.importMainWithBody("<stdin>", false, code, true))
    .then(() => {
      outputContent.textContent = output || '(Asnjë output)';
      outputContent.className = 'output-content success';
      if (!solved.includes(n)) {
        solved.push(n);
        saveState();
        document.getElementById(`card-${n}`).classList.add('solved');
        updateProgress();
      }
    })
    .catch(err => {
      outputContent.textContent = '❌ ' + (err.toString() || 'Gabim i panjohur');
      outputContent.className = 'output-content error';
    });
}

function resetCard(n, origCode) {
  document.getElementById(`code-${n}`).value = origCode;
  const outputDiv = document.getElementById(`out-${n}`);
  outputDiv.classList.remove('visible');
}

function renderCards(list) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  const noRes = document.getElementById('noResults');
  if (list.length === 0) { noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  
  list.forEach(t => {
    const isSolved = solved.includes(t.n);
    const card = document.createElement('div');
    card.className = 'card' + (isSolved ? ' solved' : '');
    card.id = `card-${t.n}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">#${String(t.n).padStart(2,'0')}</span>
        <span class="card-title">${t.title}</span>
        <span class="level-tag level-${t.level}">${t.level}</span>
      </div>
      <div class="code-area">
        <div class="code-label"><span>python</span><span>edito & ekzekuto</span></div>
        <textarea class="code-input" id="code-${t.n}" spellcheck="false">${t.code}</textarea>
      </div>
      <div class="output-area" id="out-${t.n}">
        <div class="output-label">output</div>
        <div class="output-content" id="out-content-${t.n}"></div>
      </div>
      <div class="card-footer">
        <button class="run-btn" onclick="runPython(${t.n}, document.getElementById('code-${t.n}').value)">▶ Run</button>
        <button class="reset-btn" onclick="resetCard(${t.n}, \`${t.code.replace(/`/g,'\\`')}\`)">↺ Reset</button>
        <span class="solved-badge">✓ Zgjidhur</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterCards(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function searchCards() { applyFilters(); }

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = tasks;
  if (activeFilter === 'easy') list = list.filter(t => t.level === 'easy');
  else if (activeFilter === 'mid') list = list.filter(t => t.level === 'mid');
  else if (activeFilter === 'solved') list = list.filter(t => solved.includes(t.n));
  if (q) list = list.filter(t => t.title.toLowerCase().includes(q) || String(t.n).includes(q));
  renderCards(list);
}

renderCards(tasks);
updateProgress();
</script>
